name: Terraform Apply and S3 Package Upload
on:
  push:
  workflow_dispatch:

jobs:
  terraform_apply:
    runs-on: ubuntu-latest
    outputs:
      BUCKET_NAME: ${{ steps.terraform-outputs.outputs.BUCKET_NAME }}
      DIST_ID: ${{ steps.terraform-outputs.outputs.DIST_ID }}

    # Use OIDC to connect to AWS
    permissions:
      id-token: write
      contents: read

    steps:
        # Get the code
      - name: Checkout
        uses: actions/checkout@v5

        # Login to AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          
        # Setup Terraform with disabled wrapper for the output
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Terraform Init
        id: init
        run: terraform init -reconfigure

      - name: Terraform Format
        id: fmt
        run: terraform fmt

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve 

        # Assign the outputs to the job outputs so that they can be used in the next job
      - name: Terraform Outputs
        id: terraform-outputs
        run: |
          echo BUCKET_NAME=$(terraform output -raw s3_bucket_name) >> $GITHUB_OUTPUT
          echo DIST_ID=$(terraform output -raw cloudfront_dist_id) >> $GITHUB_OUTPUT


  S3PackageUpload:
    runs-on: ubuntu-latest
    needs: terraform_apply

    # Use OIDC to connect to AWS
    permissions:
      id-token: write
      contents: read

    steps:
      # Step 1: Get the code
      - name: Checkout
        uses: actions/checkout@v5
        
      # Step 2: Login to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          
      # Step 3: Upload the files
      - name: Synchronize GitHub repos with Amazon S3 Bucket
        run: aws s3 sync . s3://${{ needs.terraform_apply.outputs.BUCKET_NAME }} --delete --exclude ".git/*" --exclude ".github/*"

      # Step 4: Clear CloudFront Cache
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ needs.terraform_apply.outputs.DIST_ID }} --paths "/*"
